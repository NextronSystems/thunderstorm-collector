name: Go

on:
  push:
  # Allow other workflows (e.g. Create Release) to reuse these jobs as a gate
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.10.x', 'stable' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go and vendor
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test with Go
        run: make test
        working-directory: ./go

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.10.x', 'stable' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go and vendor
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build release artifacts
        run: make release
