name: ShellCheck

on:
  push:
    branches: [main, master]
    paths: ['tests/**/*.sh']
  pull_request:
    paths: ['tests/**/*.sh']
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find tests/ -name '*.sh' -print0 | xargs -0 shellcheck -o all -x
