name: Create Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # Run the full Go workflow (test + build) as a gate before releasing.
  # This verifies "make release" succeeds before we publish anything.
  build:
    uses: ./.github/workflows/go.yml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # Some targets do not build with go1.10 on the cloud runner (e.g.,
      # darwin/arm64), and some targets are only available with a recent Go
      # version (e.g., aix/ppc64, linux/riscv64, or windows/arm64, to name a
      # few). Thus we need to build twice, once with go1.10 and once with
      # stable.
      # For targets that build with both version, we prefer the go1.10 build to
      # widen the support of old systems. Therefore, we build with stable first,
      # and let the go1.10 build overwrite stable builds if there are any for
      # the approriate target.
      - name: Setup Go and vendor
        uses: ./.github/actions/setup-go
        with:
          go-version: 'stable'
      - name: Build project with Go stable
        env:
          VERSION: ${{ github.ref }}
        run: |
          make release
      - name: Setup Go and vendor
        uses: ./.github/actions/setup-go
        with:
          go-version: '1.10.x'
      - name: Build project with Go 1.10
        env:
          VERSION: ${{ github.ref }}
        run: |
          make release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
